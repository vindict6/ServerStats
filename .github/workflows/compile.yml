name: Build and Release Plugin

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Auto-tag on merge to main/master
  tag:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump_version.outputs.new_tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest tag, or use v1.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "Latest tag: ${LATEST_TAG}"
      
      - name: Bump version
        id: bump_version
        run: |
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          
          # Remove 'v' prefix and split into parts
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
          
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]:-0}"
          PATCH="${VERSION_PARTS[2]:-0}"
          
          # Increment patch version
          PATCH=$((PATCH + 1))
          
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "New tag: ${NEW_TAG}"
      
      - name: Create and push tag
        run: |
          NEW_TAG="${{ steps.bump_version.outputs.new_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
          git push origin "${NEW_TAG}"

  # Build job for all events (PR, push, manual)
  build:
    runs-on: ubuntu-latest
    needs: [tag]
    if: always() && !cancelled()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        run: dotnet restore ServerStats/ServerStats.csproj
      
      - name: Build project
        run: dotnet build ServerStats/ServerStats.csproj --configuration Release --no-restore
      
      - name: Publish project
        run: dotnet publish ServerStats/ServerStats.csproj --configuration Release --no-build --output ./publish
      
      - name: Create release package
        run: |
          mkdir -p release/addons/counterstrikesharp/plugins/ServerStats
          cp publish/ServerStats.dll release/addons/counterstrikesharp/plugins/ServerStats/
          cp publish/ServerStats.pdb release/addons/counterstrikesharp/plugins/ServerStats/
          cp publish/ServerStats.deps.json release/addons/counterstrikesharp/plugins/ServerStats/ || true
      
      - name: Create zip file
        run: |
          # Determine the zip name based on context
          if [ "${{ needs.tag.result }}" = "success" ]; then
            ZIP_NAME="ServerStats-${{ needs.tag.outputs.new_tag }}.zip"
          else
            ZIP_NAME="ServerStats-build-${{ github.sha }}.zip"
          fi
          cd release && zip -r "../${ZIP_NAME}" . && cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ServerStats-build
          path: ${{ env.ZIP_NAME }}
          retention-days: 7
  
  # Release job - only on push to main/master
  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: ServerStats-build
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          files: |
            ServerStats-*.zip
          body: |
            ## ServerStats ${{ needs.tag.outputs.new_tag }}
            
            ### Installation
            1. Download `ServerStats-${{ needs.tag.outputs.new_tag }}.zip`
            2. Extract the contents to your Counter-Strike 2 server directory
            3. The plugin will be installed at `addons/counterstrikesharp/plugins/ServerStats/`
            4. Make sure to generate or copy your `.json` configuration file appropriately.
            5. Restart your server
            
            ### Requirements
            - CounterStrikeSharp framework installed on your server
            - .NET 8.0 Runtime
            
            ### Features
            - Tracks and logs player and server statistics. *(Feel free to update this description!)*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
